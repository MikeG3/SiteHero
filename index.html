<html>

<head>
    <title>Hero</title>


    <meta name="viewport" content="width=device-width, initial-scale=1.0">


    <link rel="stylesheet" type="text/css" href="hero.css">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Audiowide&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Emblema+One&family=Kode+Mono:wght@400..700&family=Michroma&display=swap" rel="stylesheet">



</head>



<body>

    <!-- ==========================================================
     HERO EXPERIENCE
     The landing experience introducing the visitor to my work.
=========================================================== -->

    <header id="hero">

        <!-- ==========================================
         Animated Background Canvas
         (Rendered entirely with JavaScript)
    =========================================== -->

        <canvas id="networkCanvas"></canvas>


        <!-- ==========================================
         Optional Background Effects
         Additional layers that can later be animated
         independently if desired.
    =========================================== -->

        <div id="backgroundGlow"></div>
        <div id="backgroundGradient"></div>
        <div id="noiseOverlay"></div>

        <!-- ==========================================
         Hero Content
    =========================================== -->

        <section id="heroContent">

            <!-- Main Identity -->
            <h1 id="heroTitle">Michael Garner</h1>

            <!-- Short Mission Statement -->
            <p id="heroStatement">
                Creating thoughtful technology that connects people,
                ideas, and engineering to solve real-world problems.
            </p>

            <!-- Optional call to action -->

            <div id="heroButtons">
                <a href="#about" class="primaryButton">
                    Explore My Work
                </a>
            </div>

        </section>


        <!-- ==========================================
         Scroll Indicator
    =========================================== -->

        <div id="scrollIndicator">

            <span></span>

        </div>

    </header>



    <!-- ==========================================================
     MAIN CONTENT
=========================================================== -->

    <main>

        <!-- The remainder of the website begins here -->

        <section id="about"></section>

    </main>



    <!-- JavaScript -->
    <script src="hero.js"></script>

</body>


</html>
